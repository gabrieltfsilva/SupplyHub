{# Component for scripts within Django templates. #}

<script>
    // Pre-calculates category-to-subcategory mapping using Django template loops.
    const subcategoriesData = {
        {% for cat_val, cat_label in categories_list %}
            "{{ cat_val }}": [
                {% for sub in subcategories %}
                    {% if sub.category == cat_val %}
                        {id: "{{ sub.id }}", name: "{{ sub.name }}"},
                    {% endif %}
                {% endfor %}
            ],
        {% endfor %}
    };

    // Dynamically filters the subcategory dropdown based on the selected category.
    function filterSubcategories(selectedSubId = null) {
        const categorySelect = document.getElementById('category');
        const subcategorySelect = document.getElementById('subcategory');
        const selectedCategory = categorySelect.value;

        subcategorySelect.innerHTML = '<option value="">Selecione a subcategoria...</option>';

        if (selectedCategory && subcategoriesData[selectedCategory]) {
            subcategoriesData[selectedCategory].forEach(sub => {
                const option = document.createElement('option');
                option.value = sub.id;
                option.textContent = sub.name;
                if (selectedSubId && sub.id == selectedSubId) {
                    option.selected = true;
                }
                subcategorySelect.appendChild(option);
            });
            subcategorySelect.disabled = false;
        } else {
            subcategorySelect.innerHTML = '<option value="">Nenhuma subcategoria encontrada</option>';
            subcategorySelect.disabled = true;
        }
    }

    // Initializes the module state and restores selected values on page load.
    document.addEventListener('DOMContentLoaded', function () {
        {% if supplier %}
            filterSubcategories("{{ supplier.subcategory.id }}");
        {% endif %}
    });

    // Displays a confirmation dialog before proceeding with record deletion.
    function confirmDelete() {
        if (confirm("Deseja realmente excluir este fornecedor? Esta ação não pode ser desfeita.")) {
            window.location.href = "{% if supplier %}{% url 'delete_supplier' supplier.id %}{% endif %}";
        }
    }
</script>
